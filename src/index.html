<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todozz</title>
</head>

<body>

    <header>

        <h1>Todozz</h1>
    </header>
    <main id="content">

        <section id="" data-key="" class="todo-list">
            <h3 class="list-title">
                My Project
            </h3>

            <ul class="todos">
                <li data-key="" id="" class="todo">
                    <div><span class="name">My Task</span> <span class="actions"><button class="edit">E</button><button
                                class="delete">D</button><button class="note">N</button></span></div>
                    <div><span class="desc">Description</span> <span class="priority">Im</span></div>
                    <div><span class="date">today</span> <span class="label"># work</span></div>
                </li>
            </ul>
        </section>

    </main>


</body>

</html>
